<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>For My Jupiter</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    :root {
      --lavender: #cdb4ff;
      --lavender-bright: #e6d8ff;
      --lavender-glow: rgba(205, 180, 255, 0.4);
      --deep-bg: #070711;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      background: #0d0918;
      color: #f8f5ff;
      font-family: 'Cormorant Garamond', serif;
      overflow-x: hidden;
      transition: background 1.5s ease;
    }

    canvas { position: fixed; inset: 0; z-index: -1; pointer-events: none; }

    /* The Distance Eraser Styling */
    .distance-container {
        text-align: center;
        padding: 60px 20px;
    }
    #live-distance {
        font-family: 'Cinzel';
        font-size: clamp(1.5rem, 5vw, 2.5rem);
        color: var(--lavender-bright);
        display: block;
        transition: all 1s ease;
    }

    /* Digital Hand-Hold Styling */
    .handhold-section {
        height: 80vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        position: relative;
    }

    .hold-zone {
        width: 120px;
        height: 120px;
        border: 2px solid var(--lavender);
        border-radius: 50%;
        display: grid;
        place-items: center;
        position: relative;
        cursor: pointer;
        transition: all 0.5s ease;
        box-shadow: 0 0 20px var(--lavender-glow);
        z-index: 10;
    }

    .hold-zone::before {
        content: '';
        position: absolute;
        inset: -10px;
        border: 1px solid var(--lavender-bright);
        border-radius: 50%;
        animation: pulse 2s infinite;
        opacity: 0.5;
    }

    @keyframes pulse {
        0% { transform: scale(1); opacity: 0.5; }
        100% { transform: scale(1.5); opacity: 0; }
    }

    .hold-active .hold-zone {
        transform: scale(0.9);
        background: var(--lavender-glow);
        box-shadow: 0 0 50px var(--lavender);
    }

    #hold-text {
        margin-top: 30px;
        font-family: 'Cinzel';
        letter-spacing: 4px;
        font-size: 0.8rem;
        transition: all 0.5s ease;
    }

    /* Shared Script Cards */
    .luxury-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(205, 180, 255, 0.1);
        padding: 40px;
        border-radius: 30px;
        margin: 40px auto;
        max-width: 800px;
    }

    .signature-path {
        fill: none;
        stroke: var(--lavender-bright);
        stroke-width: 2;
        stroke-dasharray: 1000;
        stroke-dashoffset: 1000;
    }

    .draw-sig { animation: draw 4s forwards ease-in-out; }
    @keyframes draw { to { stroke-dashoffset: 0; } }

    .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
  </style>
</head>
<body>

<canvas id="starfield"></canvas>

<section class="hero">
    <h1 style="font-family: 'Great Vibes'; font-size: clamp(5rem, 15vw, 10rem); color: var(--lavender-bright);">Jhansy</h1>
    <div class="distance-container">
        <span id="live-distance">700 Miles Away</span>
        <p class="cinzel" style="font-size: 0.6rem; opacity: 0.5; margin-top: 10px;">But 0 inches between our hearts</p>
    </div>
    <p class="cinzel" style="position: absolute; bottom: 40px; opacity: 0.4;">Scroll to feel me</p>
</section>

<section class="handhold-section" id="handhold-container">
    <h2 class="cinzel" style="margin-bottom: 50px; opacity: 0.8;">I can't reach you, so hold my hand here.</h2>
    <div class="hold-zone" id="touch-target">
        <span style="font-size: 2rem;">✨</span>
    </div>
    <p id="hold-text">PLACE AND HOLD YOUR THUMB HERE</p>
</section>

<section style="padding: 100px 20px;">
    <div class="luxury-card">
        <h2 style="font-family: 'Great Vibes'; font-size: 3rem; margin-bottom: 20px;">The Unspoken Script</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; text-align: left;">
            <div>
                <p class="cinzel" style="color: var(--lavender); font-size: 0.7rem;">The World Sees</p>
                <p style="font-style: italic; margin-top: 10px;">A long-distance relationship.</p>
            </div>
            <div>
                <p class="cinzel" style="color: var(--lavender); font-size: 0.7rem;">Ram Sees</p>
                <p style="font-style: italic; margin-top: 10px;">The only gravity that matters.</p>
            </div>
        </div>
    </div>
</section>

<section style="height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center;">
    <p class="cinzel" style="opacity: 0.6;">Always yours,</p>
    <svg width="300" height="100" viewBox="0 0 300 100">
        <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="Great Vibes" font-size="40" fill="white" opacity="0.8">Bolla Prakhyath</text>
    </svg>
</section>

<script>
    // 1. SENTIENT TAB (The "Come Back" Logic)
    let originalTitle = document.title;
    window.addEventListener('blur', () => {
        document.title = "Jupiter, come back to Ram...";
    });
    window.addEventListener('focus', () => {
        document.title = originalTitle;
    });

    // 2. LIVE DISTANCE ERASER
    const distanceText = document.getElementById('live-distance');
    const units = ["700 Miles", "1,126 Kilometers", "1,232,000 Yards", "Always nearby"];
    let unitIndex = 0;

    setInterval(() => {
        distanceText.style.opacity = 0;
        setTimeout(() => {
            distanceText.innerText = units[unitIndex];
            distanceText.style.opacity = 1;
            unitIndex = (unitIndex + 1) % units.length;
        }, 1000);
    }, 4000);

    // 3. DIGITAL HAND-HOLD LOGIC
    const touchTarget = document.getElementById('touch-target');
    const container = document.getElementById('handhold-container');
    const holdText = document.getElementById('hold-text');
    let heartRate;

    function startHolding() {
        container.classList.add('hold-active');
        holdText.innerText = "I FEEL YOU, JHANSY. DON'T LET GO.";
        holdText.style.color = "#e6d8ff";
        holdText.style.textShadow = "0 0 10px var(--lavender)";
        
        // Start "Heartbeat" vibration simulation
        heartRate = setInterval(() => {
            document.body.style.background = "#1a1028";
            setTimeout(() => { document.body.background = "#0d0918"; }, 200);
        }, 1200);
    }

    function stopHolding() {
        container.classList.remove('hold-active');
        holdText.innerText = "PLACE AND HOLD YOUR THUMB HERE";
        holdText.style.color = "white";
        holdText.style.textShadow = "none";
        document.body.style.background = "#0d0918";
        clearInterval(heartRate);
    }

    touchTarget.addEventListener('mousedown', startHolding);
    touchTarget.addEventListener('mouseup', stopHolding);
    touchTarget.addEventListener('touchstart', (e) => { e.preventDefault(); startHolding(); });
    touchTarget.addEventListener('touchend', stopHolding);

    // 4. STARFIELD BACKGROUND
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function initStars() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = Array.from({length: 150}, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2,
            blink: Math.random() * 0.05
        }));
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
            ctx.fillStyle = `rgba(230, 216, 255, ${0.3 + Math.abs(Math.sin(Date.now() * s.blink) * 0.5)})`;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
            ctx.fill();
        });
        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', initStars);
    initStars();
    animate();
</script>

</body>
</html>
