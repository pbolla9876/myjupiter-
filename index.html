<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Jupiter</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #000000;
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.5);
            --deep-red: #2a0000;
            --ivory: #fffff0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }

        body {
            background-color: var(--black);
            color: var(--ivory);
            font-family: 'Cormorant Garamond', serif;
            overflow-x: hidden;
            transition: background 2.5s ease;
        }

        /* 1. THE MIDNIGHT STAR (Constant Presence) */
        #presence-star {
            position: fixed; width: 5px; height: 5px; background: var(--gold);
            border-radius: 50%; pointer-events: none; z-index: 25000;
            box-shadow: 0 0 15px var(--gold), 0 0 30px var(--gold);
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* 2. CUSTOM CURSOR */
        #cursor { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; position: fixed; pointer-events: none; z-index: 30000; }

        /* 3. REST MODE OVERLAY */
        #presence-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a0000 0%, #000000 100%);
            z-index: 20000; display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 3s ease;
        }
        #presence-overlay.active { opacity: 1; }

        /* HERO SECTION */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; position: relative; }
        
        .jhansy-title {
            font-family: 'Great Vibes', cursive; font-size: clamp(4.5rem, 15vw, 10.5rem);
            color: var(--gold); z-index: 10; display: flex; gap: 8px;
        }
        .jhansy-title span { opacity: 0; filter: blur(20px); animation: bloom 2s forwards; }
        @keyframes bloom { to { opacity: 1; filter: blur(0); } }

        /* BREATHE GUIDE (The Coach) */
        .breathe-box { margin: 60px 0; display: flex; flex-direction: column; align-items: center; z-index: 10; }
        .breathe-circle {
            width: 100px; height: 100px; border: 1px solid var(--gold); border-radius: 50%;
            animation: breatheCycle 8s ease-in-out infinite;
        }
        @keyframes breatheCycle {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.8); opacity: 0.8; box-shadow: 0 0 50px var(--gold); }
        }
        #breathe-text { font-family: 'Cinzel'; font-size: 0.7rem; margin-top: 30px; letter-spacing: 4px; color: var(--gold); transition: 1s; }

        /* DYNAMIC LETTER SECTION */
        .letter-section { padding: 100px 15%; min-height: 100vh; display: flex; justify-content: center; }
        .handwritten-container {
            max-width: 700px; line-height: 1.8; font-size: 1.6rem;
            font-style: italic; color: rgba(255, 255, 240, 0.8);
        }
        .typing-cursor { border-right: 2px solid var(--gold); animation: blink 0.7s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* INTERACTION CARDS */
        section { padding: 80px 10%; display: flex; flex-direction: column; align-items: center; }
        .luxury-card {
            background: rgba(5, 5, 5, 0.95); border: 1px solid rgba(212, 175, 55, 0.1);
            padding: 60px; border-radius: 2px; width: 100%; max-width: 800px;
            box-shadow: 0 40px 100px rgba(0,0,0,1); text-align: center;
        }

        /* THE KISS ZONE */
        .kiss-zone {
            width: 180px; height: 180px; border: 1px solid var(--gold); border-radius: 50%;
            margin: 40px auto; display: flex; justify-content: center; align-items: center;
            cursor: pointer; position: relative;
        }
        .kiss-zone::after {
            content: ''; position: absolute; width: 100%; height: 100%;
            border: 1px solid var(--gold); border-radius: 50%; animation: sonar 3s infinite;
        }
        @keyframes sonar { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.6); opacity: 0; } }

        canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .cinzel { font-family: 'Cinzel'; letter-spacing: 4px; font-size: 0.75rem; text-transform: uppercase; opacity: 0.5; }
    </style>
</head>
<body>

    <div id="presence-star"></div>
    <div id="cursor"></div>

    <div id="presence-overlay">
        <h2 style="font-family: 'Great Vibes'; font-size: 3.5rem; color: var(--gold);">Just sleep, Jupiter.</h2>
        <p class="cinzel" style="margin-top: 20px;">I'm right here holding your hand.</p>
    </div>

    <canvas id="starfield"></canvas>

    <section class="hero">
        <div style="font-size: 3rem; margin-bottom: 10px; filter: drop-shadow(0 0 10px red);">🌹</div>
        <h1 class="jhansy-title" id="nameRef"></h1>
        
        <div class="breathe-box">
            <div class="breathe-circle"></div>
            <p id="breathe-text">BREATHE WITH ME, JUPITER</p>
        </div>
    </section>

    <section class="letter-section">
        <div class="handwritten-container">
            <span id="typewriter"></span><span class="typing-cursor"></span>
        </div>
    </section>

    <section>
        <div class="luxury-card">
            <h2 style="font-family: 'Great Vibes'; font-size: 3.2rem; color: var(--gold);">The Forehead Kiss</h2>
            <p style="font-style: italic; opacity: 0.7; margin-top: 15px;">A cure for the pain. Hold the circle.</p>
            <div class="kiss-zone" id="kissZone">
                <span id="kiss-icon" style="font-size: 2.5rem;">✨</span>
            </div>
            <p id="kiss-status" class="cinzel" style="color: var(--gold); margin-top: 20px;"></p>
        </div>
    </section>

    <footer style="padding: 100px; text-align: center;">
        <p class="cinzel">GEORGIA ————— 700 MILES ————— YOUR HEART</p>
    </footer>

    <script>
        // 1. Name Animation
        const name = "Jhansy";
        const nameRef = document.getElementById('nameRef');
        name.split('').forEach((char, i) => {
            const s = document.createElement('span');
            s.textContent = char; s.style.animationDelay = `${0.5 + (i*0.2)}s`;
            nameRef.appendChild(s);
        });

        // 2. Midnight Star & Cursor
        const cursor = document.getElementById('cursor');
        const star = document.getElementById('presence-star');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            setTimeout(() => {
                star.style.transform = `translate(${e.clientX + 20}px, ${e.clientY - 20}px)`;
            }, 120);
        });

        // 3. Breathe Text Toggle
        setInterval(() => {
            const bt = document.getElementById('breathe-text');
            bt.textContent = bt.textContent === "IN..." ? "OUT..." : "IN...";
        }, 4000);

        // 4. Hand-Written Typewriter (Trigger on Scroll)
        const letterText = "I know it hurts right now, Jaanu. I wish I could reach through this screen and rub your back or bring you a warm tea. Since I'm 700 miles away, I built this space just for you. Every star you see, every breath this page takes, it's me. You are the strongest person I know, and I am right here with you, always. Rest your eyes, my Jupiter.";
        let i = 0;
        let started = false;
        function typeWriter() {
            if (i < letterText.length) {
                document.getElementById("typewriter").innerHTML += letterText.charAt(i);
                i++;
                setTimeout(typeWriter, 50);
            }
        }
        
        window.onscroll = () => {
            if(window.scrollY > 300 && !started) {
                started = true;
                typeWriter();
            }
        };

        // 5. Forehead Kiss
        const kissZone = document.getElementById('kissZone');
        const kissStatus = document.getElementById('kiss-status');
        let kTimer;

        kissZone.onmousedown = kissZone.ontouchstart = (e) => {
            if(e.type === 'touchstart') e.preventDefault();
            kissStatus.textContent = "SENDING WARMTH...";
            document.body.style.background = "radial-gradient(circle, #3d0000 0%, #000000 100%)";
            if ("vibrate" in navigator) navigator.vibrate([200, 400, 200, 800, 200]);
            
            kTimer = setTimeout(() => {
                kissStatus.innerHTML = "I'M RIGHT THERE. ❤️<br>STAY STILL, I'VE GOT YOU.";
                document.body.style.background = "radial-gradient(circle, #6a0000 0%, #000000 100%)";
                document.getElementById('kiss-icon').textContent = "💖";
            }, 2500);
        };

        window.onmouseup = window.ontouchend = () => {
            clearTimeout(kTimer);
            document.body.style.background = "black";
            document.getElementById('kiss-icon').textContent = "✨";
            if(!kissStatus.textContent.includes("THERE")) kissStatus.textContent = "";
        };

        // 6. Starfield
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let stars = [];
        for(let i=0; i<150; i++) stars.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*1.5, v: Math.random()*0.3});
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "rgba(212,175,55,0.3)";
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill();
                s.y -= s.v; if(s.y<0) s.y = canvas.height;
            });
            requestAnimationFrame(animate);
        }
        animate();

        // 7. Rest Mode
        let rTimer;
        function resetR() {
            document.getElementById('presence-overlay').classList.remove('active');
            clearTimeout(rTimer);
            rTimer = setTimeout(() => document.getElementById('presence-overlay').classList.add('active'), 25000);
        }
        ['mousemove', 'scroll', 'touchstart'].forEach(e => window.addEventListener(e, resetR));
        resetR();
    </script>
</body>
</html>
